<section class="bg-[#050505] py-20 px-8">
  <div class="max-w-350 mx-auto">

    <h2 class="font-serif text-4xl md:text-5xl text-white text-center mb-16">
      Destaques <span class="italic text-[#c5a059]">Premium</span>
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <div *ngFor="let p of produtos"
        class="group bg-[#0f0f0f] border border-[#c5a059]/10 hover:border-[#c5a059]/50 transition-all duration-500 overflow-hidden relative">

        <span
          class="absolute top-4 right-4 z-10 bg-[#c5a059] text-black text-[10px] font-bold px-3 py-1 tracking-widest uppercase">
          Premium
        </span>

        <div class="h-64 overflow-hidden">
          <img [src]="p.img" [alt]="p.nome"
            class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-700">
        </div>

        <div class="p-8 text-center">
          <h3 class="font-serif text-xl text-white mb-2 tracking-tight">{{ p.nome }}</h3>
          <p class="text-[#c5a059] text-2xl font-light mb-6">
            R$ {{ p.preco | currency: 'BRL' }}
          </p>

          <button
            class="w-full border border-[#c5a059]/30 py-3 text-xs uppercase tracking-widest text-white hover:bg-[#c5a059] hover:text-black transition-all duration-300">
            Adicionar ao Carrinho
          </button>
        </div>

      </div>
    </div>
  </div>
</section>
